services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: clickhouse_hw
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./sql/01_create_table.sql:/docker-entrypoint-initdb.d/01_create_table.sql
      - ./sql:/opt/homework/sql
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

volumes:
  clickhouse_data:
